<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panadería · Pedidos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:  #FAF6EF;
  --wheat:  #E8D9B8;
  --crust:  #B5722A;
  --dark:   #2A1F0E;
  --mid:    #7A5C2E;
  --soft:   #F3EAD8;
  --border: #DDD0B3;
  --green:  #3A7D52;
  --red:    #C0392B;
  --shadow: 0 2px 14px rgba(42,31,14,.10);
}

body { background: var(--cream); font-family: 'Inter', sans-serif; color: var(--dark); min-height: 100vh; }

header { background: var(--dark); padding: 1rem 1.8rem; display: flex; align-items: center; gap: .8rem; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--wheat); }
.logo em { color: var(--crust); font-style: normal; }
.hdate { margin-left: auto; font-size: .75rem; color: var(--wheat); opacity: .55; text-transform: uppercase; letter-spacing: .08em; }

.tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); padding: 0 1.4rem; }
.tab { padding: .85rem 1.2rem; font-size: .87rem; font-weight: 600; color: var(--mid); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .2s, border-color .2s; user-select: none; }
.tab.active { color: var(--crust); border-color: var(--crust); }

.view { display: none; padding: 1.4rem; max-width: 820px; margin: 0 auto; }
.view.active { display: block; }

.step-label { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--crust); margin-bottom: .3rem; }
.step-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); margin-bottom: 1.2rem; }

.name-row { display: flex; gap: .7rem; align-items: center; margin-bottom: 1.4rem; }
.name-row input { flex: 1; padding: .7rem 1.1rem; border: 1.5px solid var(--border); border-radius: 9px; font-size: .95rem; background: #fff; color: var(--dark); outline: none; transition: border-color .2s; }
.name-row input:focus { border-color: var(--crust); }

.catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .9rem; margin-bottom: 1.4rem; }
.product-card { background: #fff; border: 1.5px solid var(--border); border-radius: 12px; padding: 1rem 1rem .9rem; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; gap: .5rem; transition: border-color .2s; }
.product-card.selected { border-color: var(--crust); background: #FFF8F0; }
.prod-icon { font-size: 2.2rem; line-height: 1; }
.prod-name { font-weight: 600; font-size: .92rem; color: var(--dark); }
.prod-unit { font-size: .72rem; color: var(--mid); margin-top: -.3rem; }
.qty-row { display: flex; align-items: center; gap: .5rem; margin-top: .3rem; }
.qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--soft); font-size: 1.1rem; font-weight: 700; color: var(--mid); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s, color .15s; user-select: none; }
.qty-btn:hover { background: var(--crust); border-color: var(--crust); color: #fff; }
.qty-val { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--crust); min-width: 28px; text-align: center; }

.btn-confirm { width: 100%; padding: .85rem; background: var(--crust); color: #fff; border: none; border-radius: 10px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: .02em; }
.btn-confirm:hover { opacity: .88; }
.btn-confirm:active { transform: scale(.98); }
.btn-confirm:disabled { opacity: .4; cursor: not-allowed; }

.toast { margin-top: .9rem; padding: .7rem 1rem; border-radius: 8px; font-size: .84rem; display: none; }
.toast.ok { background: #EAF4EE; color: var(--green); border: 1px solid #B6D9C2; display: block; }
.toast.err { background: #FDEDEC; color: var(--red); border: 1px solid #F1B8B3; display: block; }
.toast.loading { background: var(--soft); color: var(--mid); border: 1px solid var(--border); display: block; }

.section-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--dark); margin-bottom: .9rem; margin-top: 1.4rem; display: flex; align-items: center; gap: .5rem; }
.section-title:first-child { margin-top: 0; }

.order-card { background: #fff; border: 1px solid var(--border); border-radius: 11px; padding: .9rem 1.1rem; margin-bottom: .7rem; box-shadow: var(--shadow); position: relative; }
.order-client { font-weight: 700; font-size: .95rem; color: var(--dark); margin-bottom: .45rem; }
.order-items { display: flex; flex-wrap: wrap; gap: .35rem; }
.order-chip { background: var(--soft); border: 1px solid var(--border); border-radius: 6px; padding: .2rem .6rem; font-size: .8rem; color: var(--mid); }
.order-time { font-size: .7rem; color: #bbb; margin-top: .45rem; }
.order-del { position: absolute; top: .8rem; right: .8rem; background: none; border: none; font-size: .95rem; cursor: pointer; color: #ccc; transition: color .15s; }
.order-del:hover { color: var(--red); }

.prod-sum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .8rem; margin-bottom: 1.2rem; }
.prod-sum-card { background: #fff; border: 1px solid var(--border); border-radius: 11px; padding: .9rem 1rem; text-align: center; box-shadow: var(--shadow); }
.psc-icon { font-size: 1.8rem; }
.psc-qty { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--crust); line-height: 1.1; }
.psc-name { font-size: .78rem; color: var(--mid); font-weight: 600; margin-top: .15rem; }

.empty-msg { text-align: center; color: #bbb; font-size: .85rem; padding: 1.8rem 0; }
.clear-btn { background: none; border: 1.5px solid var(--border); color: var(--mid); border-radius: 8px; padding: .45rem 1rem; font-size: .8rem; cursor: pointer; transition: border-color .2s, color .2s; }
.clear-btn:hover { border-color: var(--red); color: var(--red); }

.cat-form { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-bottom: 1.2rem; box-shadow: var(--shadow); }
.cat-form h3 { font-size: .88rem; font-weight: 700; color: var(--mid); margin-bottom: .8rem; text-transform: uppercase; letter-spacing: .06em; }
.cat-row { display: flex; gap: .6rem; flex-wrap: wrap; }
.cat-row input, .cat-row select { flex: 1; min-width: 120px; padding: .6rem .9rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: .88rem; background: var(--soft); color: var(--dark); outline: none; }
.cat-row input:focus, .cat-row select:focus { border-color: var(--crust); background: #fff; }
.btn-add-cat { padding: .6rem 1.2rem; background: var(--crust); color: #fff; border: none; border-radius: 8px; font-size: .88rem; font-weight: 600; cursor: pointer; }
.btn-add-cat:hover { opacity: .85; }

.cat-list { display: flex; flex-direction: column; gap: .5rem; }
.cat-item { display: flex; align-items: center; gap: .8rem; background: var(--soft); border: 1px solid var(--border); border-radius: 9px; padding: .65rem 1rem; }
.cat-item-icon { font-size: 1.4rem; }
.cat-item-name { flex: 1; font-weight: 600; font-size: .9rem; }
.cat-item-unit { font-size: .78rem; color: var(--mid); }
.cat-item-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: .95rem; transition: color .15s; }
.cat-item-del:hover { color: var(--red); }

.sheets-badge { display: inline-flex; align-items: center; gap: .4rem; background: #E8F5E9; border: 1px solid #A5D6A7; border-radius: 6px; padding: .3rem .7rem; font-size: .75rem; color: #2E7D32; font-weight: 600; margin-bottom: 1rem; }

@media (max-width: 540px) {
  .catalog { grid-template-columns: 1fr 1fr; }
  .prod-sum-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🍞 Mi <em>Panadería</em></div>
  <div class="hdate" id="hdate"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('order')">📋 Nuevo pedido</div>
  <div class="tab" onclick="showTab('orders')">📦 Pedidos del día</div>
  <div class="tab" onclick="showTab('catalog')">⚙️ Catálogo</div>
</div>

<!-- NUEVO PEDIDO -->
<div class="view active" id="view-order">
  <div class="sheets-badge">🟢 Conectado a Google Sheets</div>
  <div class="step-label">Paso 1</div>
  <div class="step-title">¿Quién hace el pedido?</div>
  <div class="name-row">
    <input type="text" id="clientName" placeholder="Nombre del cliente…" maxlength="60">
  </div>
  <div class="step-label">Paso 2 — Elige cantidades</div>
  <div class="step-title" style="margin-bottom:.9rem">Catálogo de productos</div>
  <div class="catalog" id="catalog"></div>
  <button class="btn-confirm" id="confirmBtn" onclick="confirmOrder()">Enviar pedido ☁️</button>
  <div class="toast" id="toast"></div>
</div>

<!-- PEDIDOS DEL DÍA -->
<div class="view" id="view-orders">
  <div class="section-title">🏭 Resumen de producción</div>
  <div class="prod-sum-grid" id="prodSummary">
    <div class="empty-msg" style="grid-column:1/-1">Sin pedidos aún.</div>
  </div>
  <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
    <span>👤 Pedidos individuales</span>
    <button class="clear-btn" onclick="clearAll()">Borrar todo</button>
  </div>
  <div id="ordersList"><div class="empty-msg">Sin pedidos aún.</div></div>
</div>

<!-- CATÁLOGO -->
<div class="view" id="view-catalog">
  <div class="cat-form">
    <h3>Añadir producto al catálogo</h3>
    <div class="cat-row">
      <input type="text" id="newProdName" placeholder="Nombre (ej: Croissants)">
      <input type="text" id="newProdIcon" placeholder="Emoji (ej: 🥐)" maxlength="4">
      <select id="newProdUnit">
        <option value="unidades">unidades</option>
        <option value="kilos">kilos</option>
        <option value="piezas">piezas</option>
        <option value="docenas">docenas</option>
      </select>
      <button class="btn-add-cat" onclick="addCatalogItem()">+ Añadir</button>
    </div>
  </div>
  <div class="cat-list" id="catList"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCdoPTycYYVMsL5fZAhzIwWFzzYvfLrp5T2C9qa8I9RVlnF-ArYTwOH4hp2yilMGxc/exec';
const K_ORDERS  = 'pan_orders_v3';
const K_CATALOG = 'pan_catalog_v3';

const DEFAULT_CATALOG = [
  { id: 'bollos',  name: 'Bollos',   icon: '🍞', unit: 'unidades' },
  { id: 'barras',  name: 'Barras',   icon: '🥖', unit: 'unidades' },
  { id: 'kilos',   name: 'Pan (kg)', icon: '⚖️', unit: 'kilos'   },
];

let catalog = [];
let orders  = [];
let selection = {};

function load() {
  try { orders  = JSON.parse(localStorage.getItem(K_ORDERS))  || []; } catch { orders = []; }
  try {
    const c = JSON.parse(localStorage.getItem(K_CATALOG));
    catalog = (c && c.length) ? c : [...DEFAULT_CATALOG];
  } catch { catalog = [...DEFAULT_CATALOG]; }
}
function save() {
  localStorage.setItem(K_ORDERS,  JSON.stringify(orders));
  localStorage.setItem(K_CATALOG, JSON.stringify(catalog));
}

function showTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  const idx = ['order','orders','catalog'].indexOf(tab);
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if (tab === 'orders')  renderOrders();
  if (tab === 'catalog') renderCatalogManager();
}

function renderCatalog() {
  selection = {};
  const el = document.getElementById('catalog');
  el.innerHTML = catalog.map(p => `
    <div class="product-card" id="card-${p.id}">
      <div class="prod-icon">${p.icon}</div>
      <div class="prod-name">${esc(p.name)}</div>
      <div class="prod-unit">${esc(p.unit)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
        <div class="qty-val" id="qty-${p.id}">0</div>
        <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
      </div>
    </div>
  `).join('');
}

function changeQty(id, delta) {
  selection[id] = Math.max(0, (selection[id] || 0) + delta);
  document.getElementById('qty-' + id).textContent = formatN(selection[id]);
  document.getElementById('card-' + id).classList.toggle('selected', selection[id] > 0);
}

async function confirmOrder() {
  const name = document.getElementById('clientName').value.trim();
  if (!name) { alert('Escribe el nombre del cliente.'); return; }

  const items = catalog
    .filter(p => selection[p.id] > 0)
    .map(p => ({ id: p.id, name: p.name, icon: p.icon, unit: p.unit, qty: selection[p.id] }));

  if (items.length === 0) { alert('Selecciona al menos un producto.'); return; }

  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  showToast('⏳ Enviando pedido…', 'loading');

  // Save locally
  const order = {
    id: Date.now(),
    client: name,
    items,
    time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
  };
  orders.push(order);
  save();

  // Send to Google Sheets
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client: name, items })
    });
    showToast(`✅ Pedido de ${name} enviado a Google Sheets.`, 'ok');
  } catch (e) {
    showToast(`⚠️ Pedido guardado localmente (sin conexión).`, 'ok');
  }

  document.getElementById('clientName').value = '';
  renderCatalog();
  btn.disabled = false;
  setTimeout(() => { document.getElementById('toast').className = 'toast'; }, 4000);
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
}

function renderOrders() {
  const totals = {};
  for (const o of orders) {
    for (const it of o.items) {
      if (!totals[it.id]) totals[it.id] = { name: it.name, icon: it.icon, qty: 0 };
      totals[it.id].qty += it.qty;
    }
  }
  const sumEl = document.getElementById('prodSummary');
  const keys = Object.keys(totals);
  sumEl.innerHTML = keys.length ? keys.map(k => `
    <div class="prod-sum-card">
      <div class="psc-icon">${totals[k].icon}</div>
      <div class="psc-qty">${formatN(totals[k].qty)}</div>
      <div class="psc-name">${esc(totals[k].name)}</div>
    </div>
  `).join('') : '<div class="empty-msg" style="grid-column:1/-1">Sin pedidos aún.</div>';

  const listEl = document.getElementById('ordersList');
  listEl.innerHTML = orders.length ? [...orders].reverse().map(o => `
    <div class="order-card">
      <div class="order-client">👤 ${esc(o.client)}</div>
      <div class="order-items">
        ${o.items.map(it => `<span class="order-chip">${it.icon} ${formatN(it.qty)} ${esc(it.name)}</span>`).join('')}
      </div>
      <div class="order-time">🕐 ${o.time}</div>
      <button class="order-del" onclick="deleteOrder(${o.id})">✕</button>
    </div>
  `).join('') : '<div class="empty-msg">Sin pedidos aún.</div>';
}

function deleteOrder(id) {
  orders = orders.filter(o => o.id !== id);
  save();
  renderOrders();
}

function clearAll() {
  if (!confirm('¿Borrar todos los pedidos del día?')) return;
  orders = [];
  save();
  renderOrders();
}

function renderCatalogManager() {
  const el = document.getElementById('catList');
  el.innerHTML = catalog.map(p => `
    <div class="cat-item">
      <span class="cat-item-icon">${p.icon}</span>
      <span class="cat-item-name">${esc(p.name)}</span>
      <span class="cat-item-unit">${esc(p.unit)}</span>
      <button class="cat-item-del" onclick="deleteCatalogItem('${p.id}')">✕</button>
    </div>
  `).join('') || '<div class="empty-msg">El catálogo está vacío.</div>';
}

function addCatalogItem() {
  const name = document.getElementById('newProdName').value.trim();
  const icon = document.getElementById('newProdIcon').value.trim() || '🍞';
  const unit = document.getElementById('newProdUnit').value;
  if (!name) { alert('Escribe el nombre del producto.'); return; }
  const id = name.toLowerCase().replace(/\s+/g,'_') + '_' + Date.now();
  catalog.push({ id, name, icon, unit });
  save();
  renderCatalogManager();
  renderCatalog();
  document.getElementById('newProdName').value = '';
  document.getElementById('newProdIcon').value = '';
}

function deleteCatalogItem(id) {
  catalog = catalog.filter(p => p.id !== id);
  save();
  renderCatalogManager();
  renderCatalog();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatN(n) { return Number.isInteger(n) ? n : parseFloat(n.toFixed(2)); }

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
  load();
  renderCatalog();
});
</script>
</body>
</html>
